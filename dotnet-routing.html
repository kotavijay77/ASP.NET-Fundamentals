function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(" ");
  let line = "", cy = y;
  for (let w of words) {
    const test = line + w + " ";
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line.trim(), x, cy);
      line = w + " "; cy += lineH;
      if (cy > 800) break;
    } else { line = test; }
  }
  if (line.trim()) ctx.fillText(line.trim(), x, cy);
}

const downloadCardImage = (card, index, prefix) => {

  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#070c14"); bg.addColorStop(1,"#0b1422");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#1a3050"; ctx.lineWidth=1.5; ctx.strokeRect(1,1,W-2,H-2);
  const bar = ctx.createLinearGradient(0,0,W,0);
  bar.addColorStop(0,"#00c8f8"); bar.addColorStop(1,"#00e896");
  ctx.fillStyle=bar; ctx.fillRect(0,0,W,4);
  ctx.fillStyle="#1a3050"; ctx.fillRect(30,H/2-1,W-60,1);
  ctx.fillStyle="#00c8f820"; ctx.fillRect(0,4,W,H/2-4);

  ctx.fillText("Q "+String(index+1).padStart(2,"0"),30,34);

  ctx.font="bold 11px monospace"; ctx.fillStyle="#00e896";

  link.href=canvas.toDataURL("image/png"); link.click();

const flashcards = [
  {q:"What does UseRouting() do?",a:"Matches the incoming request to an endpoint and stores the result in HttpContext. It does NOT execute the endpoint — that happens at UseEndpoints()."},
  {q:"Conventional vs Attribute routing — when to use each?",a:"Conventional: MVC apps with views. Attribute: Web APIs. [ApiController] ignores conventional routes — you must use attribute routing on API controllers."},
  {q:"What is a route constraint? Give examples.",a:"Filters what a route parameter matches. {id:int} = integers only, {name:alpha} = letters, {id:guid} = GUIDs, {id:min(1)} = int >= 1. Chain with colons: {id:int:min(1)}."},
  {q:"Difference: {id}, {id?}, {id=0}",a:"{id} = required, won't match if missing. {id?} = optional, null if absent. {id=0} = optional with default 0. All three stop at slashes (non-greedy)."},
  {q:"What does {**path} do differently from {*path}?",a:"{**path} is a catch-all that also captures forward slashes. {*path} is the old syntax. Use ** in modern ASP.NET Core for path segments like /files/a/b/c."},
  {q:"What are the 6 [FromXxx] binding sources?",a:"[FromRoute], [FromQuery], [FromBody], [FromHeader], [FromForm], [FromServices]. [ApiController] infers these — complex types go to [FromBody], route params to [FromRoute], rest to [FromQuery]."},
  {q:"What is MapGroup() and why use it?",a:"Creates a RouteGroupBuilder. All routes added inherit the group's prefix and applied metadata (auth, CORS, rate limits, filters, OpenAPI tags). Eliminates repetition across related endpoints."},
  {q:"How does route precedence work?",a:"Literal > constrained param > unconstrained param > catch-all. For equal scores, first registered wins. Use constraints to disambiguate overlapping routes."},
  {q:"What is .ShortCircuit() in .NET 8?",a:"Responds immediately before running the full middleware pipeline (auth, logging, etc). Use on health probes and /favicon.ico to eliminate unnecessary overhead on every K8s liveness check."},
  {q:"Difference: liveness vs readiness health checks?",a:"Liveness: is the process alive? Failing = restart the pod. Readiness: is the service ready for traffic? Failing = remove from load balancer but don't restart."},
  {q:"What are the 3 API versioning strategies?",a:"URL segment (/api/v1/...), query string (?api-version=1.0), request header (X-Api-Version). URL segment is most visible. Use ApiVersionReader.Combine() to support multiple simultaneously."},
  {q:"How does gRPC routing work in ASP.NET Core?",a:"MapGrpcService<T>() auto-routes based on .proto definitions. POST /ServiceName/MethodName with content-type: application/grpc. Can coexist with REST on the same port."},
  {q:"What is YARP and when do you need it?",a:"Yet Another Reverse Proxy — Microsoft's library for building API gateways in .NET. Use when you need routing across multiple microservices, load balancing, header transforms, or BFF patterns."},
  {q:"What is an Endpoint Filter?",a:"Middleware scoped to one endpoint. Added via .AddEndpointFilter(). Runs before/after the handler. Chain multiple; they execute in order. Can short-circuit by not calling next."},
  {q:"How do rate limiting policies map to routes?",a:"Define policies with AddFixedWindowLimiter / AddSlidingWindowLimiter / AddTokenBucketLimiter. Apply per-endpoint with .RequireRateLimiting('policyName') or to an entire MapGroup."},
  {q:"How do you debug a route that isn't matching?",a:"1) Check constraint type mismatch. 2) Verify HTTP verb. 3) Look for catch-all registered too early. 4) Enable routing debug logging. 5) Use /_debug/routes endpoint to list all registered routes."},
];

const faqs = [
  {q:"Can I mix conventional and attribute routing?",a:"Yes. They coexist. Attribute routing takes precedence for decorated controllers. Avoid mixing on the same controller — it creates ambiguity. [ApiController] requires attribute routing and ignores MapControllerRoute patterns."},
  {q:"Why is my route not matching?",a:"Top 5 causes: (1) Constraint mismatch — {id:int} won't match 'abc'. (2) Wrong HTTP verb. (3) Catch-all registered too early. (4) Missing UseRouting() or wrong middleware order. (5) [ApiController] needs explicit [Route]."},
  {q:"When should I use Minimal APIs vs Controllers?",a:"Minimal APIs: microservices, CQRS handlers, lightweight services, high perf. Controllers: large enterprise apps, complex ActionFilters, existing MVC codebases. Performance is nearly identical in .NET 7+."},
  {q:"How do I handle AmbiguousMatchException?",a:"Two equally-specific routes conflict. Fix: (1) Add constraints to differentiate them. (2) Check verbs are specified explicitly. (3) Ensure one route is more specific (literal > param). (4) Check registration order."},
  {q:"How do I apply a global /api prefix to all routes?",a:"Minimal APIs: app.MapGroup('/api') then add all routes to that group. Controllers: use a base controller class with [Route('api/[controller]')]. Avoids repeating the prefix everywhere."},
  {q:"Can I run REST and gRPC on the same port?",a:"Yes — ASP.NET Core dispatches by content-type. REST uses any content-type, gRPC uses application/grpc over HTTP/2. Register both: app.MapControllers() and app.MapGrpcService<T>(). Requires HTTP/2 configured."},
  {q:"How do I version APIs without breaking existing clients?",a:"Mark old version deprecated not removed: [ApiVersion('1.0', Deprecated = true)]. Keep endpoints running until adoption drops. Use ReportApiVersions = true so clients see sunset versions in response headers."},
  {q:"Does middleware run on .ShortCircuit() endpoints?",a:"No — that's the entire point. Short-circuit endpoints respond before UseRouting()'s downstream pipeline runs. Do NOT apply auth or logging to health probes using .ShortCircuit() — it's for pure speed."},
  {q:"How do I expose an endpoint on internal port only?",a:"Use .RequireHost('*:8081') to restrict an endpoint to a specific port. Expose port 8080 externally, 8081 internally only. Combine with .ShortCircuit() for zero-overhead internal probes."},
  {q:"What's the right health check setup for Kubernetes?",a:"Two probes: /health/live (liveness — tags: live, .ShortCircuit()) and /health/ready (readiness — tags: ready, checks DB/Redis). Readiness should return 503 when unhealthy so K8s removes the pod from the load balancer."},
  {q:"How does YARP differ from rolling your own proxy?",a:"YARP is production-grade with config-driven routing, load balancing, transforms, health checks, and session affinity built-in. Rolling your own with HttpClient is fine for simple cases but YARP is actively maintained by Microsoft."},
  {q:"How do I apply rate limiting per user, not globally?",a:"Use a partitioned limiter: o.AddPolicy('perUser', ctx => RateLimitPartition.GetFixedWindowLimiter(ctx.User?.Identity?.Name ?? ctx.Connection.RemoteIpAddress?.ToString(), _ => new FixedWindowRateLimiterOptions { PermitLimit = 30, Window = TimeSpan.FromMinutes(1) }))."},
];

const FlipCard = ({q, a, index, onDownload}) => {
  const [flipped, setFlipped] = useState(false);
  return (
    <div style={{perspective:"1200px",height:"200px",cursor:"pointer"}}>
      <div onClick={()=>setFlipped(f=>!f)} style={{position:"relative",width:"100%",height:"100%",transformStyle:"preserve-3d",transform:flipped?"rotateY(180deg)":"rotateY(0)",transition:"transform 0.42s cubic-bezier(.4,0,.2,1)"}}>
        <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",background:C.card,border:`1px solid ${C.border}`,borderTop:`3px solid ${C.accent}`,borderRadius:"10px",padding:"18px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <span style={{color:C.muted,fontSize:"10px",fontFamily:"monospace"}}>Q {String(index+1).padStart(2,"0")}</span>
            <button onClick={e=>{e.stopPropagation();onDownload();}} style={{background:`${C.accent}18`,border:`1px solid ${C.accent}40`,color:C.accent,borderRadius:"5px",padding:"2px 8px",fontSize:"10px",cursor:"pointer",fontFamily:"monospace"}}>⬇ PNG</button>
          </div>
          <div style={{color:C.text,fontSize:"13px",fontWeight:"600",lineHeight:"1.55"}}>{q}</div>
          <div style={{color:C.muted,fontSize:"10px",textAlign:"right"}}>tap to flip →</div>
        </div>
        <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",transform:"rotateY(180deg)",background:"linear-gradient(135deg,#061520,#081c14)",border:`1px solid ${C.green}33`,borderTop:`3px solid ${C.green}`,borderRadius:"10px",padding:"18px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
          <div style={{color:"#8fffd4",fontSize:"12.5px",lineHeight:"1.65"}}>{a}</div>
        </div>
      </div>
    </div>
  );
};

function App() {
  const [tab, setTab] = useState("overview");
  const [level, setLevel] = useState("l1");
  const [downloading, setDownloading] = useState(false);

  const handleDownloadAll = useCallback(async (cards, prefix) => {
    setDownloading(true);
    await downloadAllCards(cards, prefix);
    setDownloading(false);
  }, []);

  const tabs = [
    {id:"overview",label:"📖 Overview"},
    {id:"flashcards",label:"🃏 Flashcards"},
    {id:"faqs",label:"❓ FAQ Cards"},
  ];

  const curIdx = levels.findIndex(l=>l.id===level);
  const curLevel = levels[curIdx];

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      <div style={{background:"linear-gradient(160deg,#080f1e 0%,#050d18 60%,#07060f 100%)",borderBottom:`1px solid ${C.border}`,padding:"26px 28px 0"}}>
        <div style={{maxWidth:"1120px",margin:"0 auto"}}>
          <div style={{display:"flex",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
            <Tag t="ASP.NET CORE" color={C.accent}/>
            <Tag t="WEB API" color={C.green}/>
            <Tag t="MICROSERVICES" color={C.pink}/>
          </div>
          <h1 style={{fontSize:"clamp(20px,3.5vw,30px)",fontWeight:"900",letterSpacing:"-0.035em",margin:"0 0 4px",background:`linear-gradient(90deg,${C.accent} 0%,${C.green} 50%,${C.yellow} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Routing — Complete Guide</h1>
          <p style={{color:C.muted,fontSize:"13px",margin:"0 0 22px"}}>6 levels · 16 flashcards · 12 FAQ cards · downloadable PNGs</p>
          <div style={{display:"flex",gap:"2px",flexWrap:"wrap"}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?`${C.accent}14`:"transparent",color:tab===t.id?C.accent:C.muted,border:"none",borderBottom:`2px solid ${tab===t.id?C.accent:"transparent"}`,padding:"9px 16px",fontSize:"12.5px",fontWeight:"700",cursor:"pointer",transition:"all .2s",borderRadius:"6px 6px 0 0"}}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:"1120px",margin:"0 auto",padding:"28px 20px 60px"}}>

        {tab==="overview" && (
          <div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"26px"}}>
              {levels.map(l=>(
                <button key={l.id} onClick={()=>setLevel(l.id)} style={{background:level===l.id?`${l.color}18`:C.surface,color:level===l.id?l.color:C.muted,border:`1px solid ${level===l.id?l.color+"55":C.border}`,borderRadius:"8px",padding:"7px 14px",fontSize:"11.5px",fontWeight:"700",cursor:"pointer",transition:"all .2s",fontFamily:"monospace"}}>{l.icon} {l.badge}</button>
              ))}
            </div>

            <div style={{background:`linear-gradient(120deg,${curLevel.color}0c,transparent)`,border:`1px solid ${curLevel.color}2e`,borderRadius:"12px",padding:"18px 22px",marginBottom:"22px",display:"flex",alignItems:"center",gap:"16px"}}>
              <span style={{fontSize:"34px"}}>{curLevel.icon}</span>
              <div>
                <Tag t={curLevel.badge} color={curLevel.color}/>
                <h2 style={{margin:"6px 0 2px",fontSize:"18px",fontWeight:"800",color:curLevel.color}}>{curLevel.title}</h2>
                <p style={{margin:0,color:C.muted,fontSize:"12px"}}>{curLevel.sub}</p>
              </div>
            </div>

            <div style={{display:"grid",gap:"18px"}}>
              {curLevel.sections.map((s,i)=>(
                <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"18px 22px"}}>
                  <h3 style={{margin:"0 0 8px",fontSize:"14px",fontWeight:"700",color:curLevel.color,display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{width:"20px",height:"20px",background:`${curLevel.color}1a`,borderRadius:"4px",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontFamily:"monospace",flexShrink:0}}>{i+1}</span>
                    {s.h}
                  </h3>
                  <p style={{margin:"0",color:"#8aa4bf",fontSize:"13px",lineHeight:"1.65"}}>{s.b}</p>
                  <Code code={s.code}/>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:"10px",marginTop:"22px"}}>
              {curIdx>0&&<button onClick={()=>{setLevel(levels[curIdx-1].id);window.scrollTo({top:0});}} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.muted,borderRadius:"8px",padding:"10px 20px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>← Previous</button>}
              {curIdx<levels.length-1&&<button onClick={()=>{setLevel(levels[curIdx+1].id);window.scrollTo({top:0});}} style={{flex:1,background:`${curLevel.color}14`,border:`1px solid ${curLevel.color}44`,color:curLevel.color,borderRadius:"8px",padding:"10px 20px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>Continue → {levels[curIdx+1].badge}: {levels[curIdx+1].title}</button>}
            </div>
          </div>
        )}

        {tab==="flashcards" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"22px",flexWrap:"wrap",gap:"12px"}}>
              <div>
                <h2 style={{margin:"0 0 4px",fontSize:"17px",fontWeight:"800"}}>Revision Flashcards</h2>
                <p style={{margin:0,color:C.muted,fontSize:"12px"}}>{flashcards.length} cards · click to flip · download individual or all</p>
              </div>
              <button onClick={()=>handleDownloadAll(flashcards,"routing-flashcard")} disabled={downloading} style={{background:downloading?C.surface:`${C.accent}18`,border:`1px solid ${downloading?C.border:C.accent+"55"}`,color:downloading?C.muted:C.accent,borderRadius:"8px",padding:"9px 18px",fontSize:"12px",fontWeight:"700",cursor:downloading?"default":"pointer"}}>
                {downloading?"⏳ Downloading...":` ⬇ Download All ${flashcards.length} Cards`}
              </button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:"14px"}}>
              {flashcards.map((c,i)=><FlipCard key={i} q={c.q} a={c.a} index={i} onDownload={()=>downloadCardImage(c,i,"routing-flashcard")}/>)}
            </div>
          </div>
        )}

        {tab==="faqs" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"22px",flexWrap:"wrap",gap:"12px"}}>
              <div>
                <h2 style={{margin:"0 0 4px",fontSize:"17px",fontWeight:"800"}}>FAQ Flashcards</h2>
                <p style={{margin:0,color:C.muted,fontSize:"12px"}}>{faqs.length} real-world questions · click to reveal · download any card</p>
              </div>
              <button onClick={()=>handleDownloadAll(faqs,"routing-faq")} disabled={downloading} style={{background:downloading?C.surface:`${C.green}18`,border:`1px solid ${downloading?C.border:C.green+"55"}`,color:downloading?C.muted:C.green,borderRadius:"8px",padding:"9px 18px",fontSize:"12px",fontWeight:"700",cursor:downloading?"default":"pointer"}}>
                {downloading?"⏳ Downloading...":` ⬇ Download All ${faqs.length} Cards`}
              </button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:"14px"}}>
              {faqs.map((c,i)=><FlipCard key={i} q={c.q} a={c.a} index={i} onDownload={()=>downloadCardImage(c,i,"routing-faq")}/>)}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
